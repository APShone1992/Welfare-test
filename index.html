<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Welfare Support</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --brand:#1a3a6b;--brand-mid:#1e4d9b;--brand-light:#2563d4;
      --accent:#e8f0fe;--surface:#ffffff;--surface-2:#f7f9ff;--surface-3:#eef2fb;
      --border:rgba(26,58,107,0.10);--border-mid:rgba(26,58,107,0.18);
      --text-primary:#0d1f3c;--text-secondary:#4a5878;--text-muted:#8a94a8;
      --shadow-sm:0 1px 3px rgba(13,31,60,0.08),0 1px 2px rgba(13,31,60,0.04);
      --shadow-lg:0 12px 40px rgba(13,31,60,0.14),0 4px 12px rgba(13,31,60,0.08);
      --radius-sm:8px;--radius-md:12px;--radius-lg:18px;
      --font:system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif;--tr:0.16s ease;
    }
    [hidden]{display:none!important}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{font-family:var(--font);background:linear-gradient(145deg,#d6e4ff 0%,#e8f0ff 50%,#f0f5ff 100%);color:var(--text-primary);-webkit-font-smoothing:antialiased;}
    .chat-container{width:100%;max-width:540px;margin:28px auto;background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg),0 0 0 1px var(--border);display:flex;flex-direction:column;min-height:580px;overflow:hidden;animation:containerIn .3s cubic-bezier(.22,1,.36,1) both;}
    @keyframes containerIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .chat-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:linear-gradient(135deg,var(--brand) 0%,var(--brand-mid) 100%);color:#fff;position:relative;overflow:hidden;}
    .chat-header::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% -20%,rgba(255,255,255,0.10) 0%,transparent 60%);pointer-events:none;}
    .header-brand{display:flex;align-items:center;gap:10px;z-index:1}
    .bot-avatar-wrap{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.28);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .bot-avatar{width:24px;height:24px;object-fit:contain}
    .header-text h1{font-size:16px;font-weight:700;letter-spacing:.01em;line-height:1.2}
    .header-sub{font-size:11px;opacity:.70;letter-spacing:.02em;display:block;margin-top:1px}
    .header-actions{display:flex;gap:7px;align-items:center;z-index:1}
    .header-btn,.clear-btn{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.13);color:#fff;border:1px solid rgba(255,255,255,0.22);border-radius:var(--radius-sm);padding:6px 11px;font-size:12.5px;font-family:var(--font);font-weight:600;cursor:pointer;transition:background var(--tr),border-color var(--tr);letter-spacing:.01em;}
    .header-btn:hover,.clear-btn:hover{background:rgba(255,255,255,0.24);border-color:rgba(255,255,255,0.36);outline:none;}
    .chat-window{flex:1;overflow-y:auto;background:var(--surface-2);display:flex;flex-direction:column-reverse;padding:10px 16px;}
    .chat-window::-webkit-scrollbar{width:4px}.chat-window::-webkit-scrollbar-track{background:transparent}.chat-window::-webkit-scrollbar-thumb{background:var(--border-mid);border-radius:4px}
    .msg{display:flex;flex-direction:column;gap:3px;margin:6px 0;animation:msgIn .2s cubic-bezier(.22,1,.36,1) both;}
    @keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .msg.bot{align-items:flex-start}.msg.user{align-items:flex-end}
    .timestamp{font-size:10.5px;color:var(--text-muted);padding:0 4px;letter-spacing:.02em;user-select:none}
    .bubble{max-width:min(82%,400px);padding:10px 14px;border-radius:var(--radius-lg);line-height:1.55;font-size:14.5px;white-space:pre-wrap;}
    .bubble.bot{background:var(--surface);color:var(--text-primary);border:1px solid var(--border);box-shadow:var(--shadow-sm);border-bottom-left-radius:4px;}
    .bubble.user{background:linear-gradient(135deg,#1e4d9b 0%,#1a3a6b 100%);color:#fff;box-shadow:var(--shadow-sm);border-bottom-right-radius:4px;}
    .bubble.bot a{color:var(--brand-light);font-weight:600;text-decoration:underline;text-underline-offset:2px}
    .bubble b,.bubble strong{font-weight:700}
    .typing-bubble{display:inline-flex;align-items:center;gap:5px;padding:12px 16px;min-width:52px;}
    .dot{width:7px;height:7px;border-radius:50%;background:var(--text-muted);animation:dotBounce 1.2s ease-in-out infinite}
    .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
    @keyframes dotBounce{0%,60%,100%{transform:translateY(0);opacity:0.5}30%{transform:translateY(-5px);opacity:1}}
    .map-preview{display:block;width:100%;max-width:300px;border-radius:var(--radius-md);margin-top:8px;border:1px solid var(--border);box-shadow:var(--shadow-sm)}
    .input-area{display:flex;flex-direction:row;gap:6px;border-top:1px solid var(--border);padding:10px 12px;padding-bottom:calc(10px + env(safe-area-inset-bottom));align-items:center;background:var(--surface)}
    .input-wrap{position:relative;flex:1;min-width:0}
    .input-area input{width:100%;padding:10px 13px;border-radius:var(--radius-md);border:1.5px solid var(--border-mid);background:var(--surface-3);font-size:14px;font-family:var(--font);color:var(--text-primary);outline:none;transition:border-color var(--tr),background var(--tr),box-shadow var(--tr);}
    .input-area input::placeholder{color:var(--text-muted)}
    .input-area input:focus{border-color:var(--brand-light);background:var(--surface);box-shadow:0 0 0 3px rgba(37,99,212,0.12)}
    .input-row-btns{display:flex;align-items:center;gap:6px;flex-shrink:0}
    .input-row-btns button{padding:9px 15px;font-size:13.5px;font-family:var(--font);font-weight:600;background:var(--brand);color:#fff;border:none;border-radius:var(--radius-md);cursor:pointer;transition:background var(--tr),box-shadow var(--tr),transform var(--tr);display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
    .input-row-btns button:hover{background:var(--brand-mid);box-shadow:0 4px 12px rgba(26,58,107,0.28)}
    .input-row-btns button:active{transform:scale(0.97)}
    .input-row-btns button:disabled{opacity:0.5;cursor:not-allowed;transform:none}
    .icon-btn{width:38px!important;min-width:38px!important;height:38px!important;padding:0!important;border-radius:var(--radius-sm)!important;justify-content:center}
    .suggestions{position:absolute;left:0;right:0;bottom:calc(100% + 6px);background:var(--surface);border:1px solid var(--border-mid);border-radius:var(--radius-md);overflow:hidden;z-index:50;box-shadow:var(--shadow-lg)}
    .suggestion-item{padding:10px 13px;cursor:pointer;font-size:13.5px;color:var(--text-primary);border-bottom:1px solid var(--border);transition:background var(--tr)}
    .suggestion-item:last-child{border-bottom:none}.suggestion-item:hover{background:var(--accent)}
    .chips{display:flex;flex-wrap:wrap;gap:7px;margin:8px 0 4px;max-width:92%;animation:msgIn .2s cubic-bezier(.22,1,.36,1) both}
    .chip-btn{border:1.5px solid var(--border-mid);background:var(--surface);color:var(--brand);padding:7px 13px;border-radius:999px;cursor:pointer;font-size:13px;font-family:var(--font);font-weight:500;transition:background var(--tr),border-color var(--tr),color var(--tr),transform var(--tr)}
    .chip-btn:hover{background:var(--accent);border-color:var(--brand-light);color:var(--brand-light);transform:translateY(-1px)}
    .chip-btn:disabled{opacity:0.45;cursor:not-allowed;transform:none}
    .drawer-overlay{position:fixed;inset:0;background:rgba(13,31,60,0.42);backdrop-filter:blur(2px);z-index:99998;animation:fadeIn .18s ease both}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .drawer{position:fixed;top:0;right:0;height:100vh;width:min(420px,92vw);background:var(--surface);z-index:99999;box-shadow:-16px 0 50px rgba(13,31,60,0.16);border-left:1px solid var(--border);display:flex;flex-direction:column;animation:drawerIn .24s cubic-bezier(.22,1,.36,1) both}
    @keyframes drawerIn{from{transform:translateX(100%);opacity:.5}to{transform:translateX(0);opacity:1}}
    .drawer-header{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--border)}
    .drawer-title-wrap{display:flex;align-items:center;gap:8px;color:var(--brand)}
    .drawer-title-wrap h2{font-size:17px;font-weight:700;color:var(--text-primary)}
    .drawer-close{width:32px;height:32px;border-radius:var(--radius-sm);border:1px solid var(--border-mid);background:var(--surface-3);color:var(--text-secondary);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:background var(--tr)}
    .drawer-close:hover{background:#fde8e8;color:#b91c1c;border-color:#fca5a5}
    .drawer-body{padding:14px;overflow-y:auto;flex:1}
    .drawer-hint{font-size:13px;color:var(--text-muted);margin-bottom:12px}
    .drawer-categories{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
    .cat-pill{border:1.5px solid var(--border-mid);background:var(--surface-3);color:var(--text-secondary);padding:6px 12px;border-radius:999px;cursor:pointer;font-size:12.5px;font-family:var(--font);font-weight:500;transition:background var(--tr),border-color var(--tr),color var(--tr)}
    .cat-pill:hover,.cat-pill[aria-selected="true"]{background:var(--accent);border-color:var(--brand-light);color:var(--brand-light)}
    .drawer-questions{display:flex;flex-direction:column;gap:6px}
    .drawer-q{text-align:left;border:1px solid var(--border);background:var(--surface);border-radius:var(--radius-md);padding:10px 13px;cursor:pointer;font-size:13.5px;font-family:var(--font);color:var(--text-primary);display:flex;align-items:center;justify-content:space-between;gap:8px;transition:background var(--tr),border-color var(--tr),transform var(--tr);line-height:1.4}
    .drawer-q::after{content:'→';font-size:13px;color:var(--text-muted);flex-shrink:0}
    .drawer-q:hover{background:var(--accent);border-color:rgba(37,99,212,0.22);transform:translateX(2px)}
    .msg-meta{display:flex;align-items:center;justify-content:space-between;padding:2px 4px;gap:8px;min-height:18px}
    .msg.user .msg-meta{flex-direction:row-reverse}
    .feedback-btns{display:flex;align-items:center;gap:4px;opacity:0;transition:opacity .2s}
    .msg:hover .feedback-btns{opacity:1}
    .feedback-btn{background:none;border:1px solid var(--border-mid);border-radius:6px;padding:2px 6px;font-size:12px;cursor:pointer;line-height:1;transition:background var(--tr),border-color var(--tr);color:var(--text-muted);}
    .feedback-btn:hover{background:var(--accent);border-color:var(--brand-light)}
    .feedback-btn.selected{background:var(--accent);border-color:var(--brand-light)}
    .feedback-btn:disabled{cursor:default;opacity:0.6}
    .feedback-thanks{font-size:11px;color:var(--text-muted);margin-left:2px}
    .copy-num-btn{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;margin-left:4px;vertical-align:middle;background:var(--surface-3);border:1px solid var(--border-mid);border-radius:5px;cursor:pointer;color:var(--brand);font-size:10px;}
    .copy-num-btn:hover{background:var(--accent);border-color:var(--brand-light)}
    .sms-char-counter{font-size:11px;color:var(--text-muted);text-align:right;margin-top:2px;padding:0 2px}
    .sms-char-counter.over{color:#dc2626;font-weight:600}
    :focus-visible{outline:2px solid var(--brand-light);outline-offset:2px;border-radius:4px}
    @media(max-width:580px){.chat-container{max-width:100%;margin:0;min-height:100vh;min-height:100dvh;border-radius:0;animation:none}body{background:var(--surface)}.header-sub{display:none}}
  </style>
</head>
<body>
  <div class="chat-container">
    <header class="chat-header">
      <div class="header-brand">
        <div class="bot-avatar-wrap">
          <img src="public/assets/Bot-icon.png" class="bot-avatar" alt="Welfare Support bot" />
        </div>
        <div class="header-text">
          <h1>Welfare Support</h1>
          <span class="header-sub">Kelly — here to help</span>
        </div>
      </div>
      <div class="header-actions">
        <button id="topicsBtn" class="header-btn" type="button" aria-haspopup="dialog" aria-controls="topicsDrawer">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          Topics
        </button>
        <button id="clearBtn" class="clear-btn" type="button" aria-label="Clear chat">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>
          Clear
        </button>
        <a href="admin.html" class="clear-btn" id="adminBtn" style="font-size:11px;padding:5px 9px;opacity:0.7">⚙️ Admin</a>
      </div>
    </header>

    <div id="chatWindow" class="chat-window" role="log" aria-live="polite" aria-relevant="additions" aria-atomic="false"></div>

    <div class="input-area">
      <div class="input-wrap">
        <input id="chatInput" type="text" placeholder="Type your question…" autocomplete="off" aria-label="Ask a question" />
        <div id="suggestions" class="suggestions" role="listbox" aria-label="Suggestions" hidden></div>
      </div>
      <div class="input-row-btns">
        <button id="micBtn" class="icon-btn" type="button" aria-label="Voice input" title="Voice input" aria-pressed="false">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
        <button id="voiceBtn" class="icon-btn" type="button" aria-label="Toggle voice output" title="Toggle voice output" aria-pressed="false">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        </button>
        <button id="sendBtn" type="button" aria-label="Send message">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          Send
        </button>
      </div>
    </div>
  </div>

  <!-- Topics Drawer -->
  <div id="drawerOverlay" class="drawer-overlay" hidden></div>
  <aside id="topicsDrawer" class="drawer" role="dialog" aria-modal="true" aria-label="Topics" hidden>
    <div class="drawer-header">
      <div class="drawer-title-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <h2>Browse Topics</h2>
      </div>
      <button id="drawerCloseBtn" class="drawer-close" type="button" aria-label="Close topics">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="drawer-body">
      <p class="drawer-hint">Select a category or pick a question below:</p>
      <div id="drawerCategories" class="drawer-categories"></div>
      <div id="drawerQuestions" class="drawer-questions"></div>
    </div>
  </aside>

  <!-- Load chat app -->
  <script src="public/chat.js"></script>

  <!-- ═══════════════════════════════════════════════
       SUPABASE BRIDGE
       Intercepts what chat.js writes to localStorage
       and mirrors it to Supabase so all devices sync.
       Falls back silently if Supabase not configured.
  ═══════════════════════════════════════════════ -->
  <script>
  (function() {
    /* ── CONFIGURATION ─────────────────────────────
       Paste your Supabase URL and anon key here.
       Get them from: supabase.com → your project
       → Settings → API
    ─────────────────────────────────────────────── */
    const SUPABASE_URL  = 'https://jlhtcwsbigznojwfxmox.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsaHRjd3NiaWd6bm9qd2Z4bW94Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzOTkzNjcsImV4cCI6MjA4ODk3NTM2N30.u9hOH97ASyyVaLgBKHdrdBo1F8W1BIqwGrm06vcvasU';
    /* ─────────────────────────────────────────────── */

    const configured = !SUPABASE_URL.startsWith('PASTE');
    if (!configured) return; // silently skip until configured

    // Supabase REST helper
    async function sbInsert(table, row) {
      try {
        await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_ANON,
            'Authorization': `Bearer ${SUPABASE_ANON}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify(row)
        });
      } catch(e) { /* network error — localStorage still works */ }
    }

    /* Intercept localStorage.setItem so we catch
       every write chat.js makes without touching chat.js */
    const _origSet = localStorage.setItem.bind(localStorage);
    localStorage.setItem = function(key, value) {
      _origSet(key, value);  // always write locally first

      // SMS log — chat.js writes the whole array each time
      if (key === 'ws_sms_log_v1') {
        try {
          const arr = JSON.parse(value);
          if (!Array.isArray(arr) || !arr.length) return;
          const latest = arr[arr.length - 1];
          // Only push if this is a brand-new record (within last 5 seconds)
          if (latest && Date.now() - latest.ts < 5000) {
            sbInsert('sms_log', {
              ts:          latest.ts,
              sender_name: latest.name        || '',
              phone:       latest.phone       || '',
              type:        latest.type        || '',
              content:     latest.description || ''
            });
          }
        } catch(e) {}
      }

      // Unresolved log
      if (key === 'ws_unresolved_v1') {
        try {
          const arr = JSON.parse(value);
          if (!Array.isArray(arr) || !arr.length) return;
          const latest = arr[arr.length - 1];
          if (latest && Date.now() - latest.ts < 5000) {
            sbInsert('unresolved', {
              ts:    latest.ts,
              query: latest.text || '',
              type:  latest.text?.includes('[marked unhelpful]') ? 'unhelpful' : 'unanswered'
            });
          }
        } catch(e) {}
      }

      // Sessions log
      if (key === 'ws_sessions_v1') {
        try {
          const arr = JSON.parse(value);
          if (!Array.isArray(arr) || !arr.length) return;
          const latest = arr[arr.length - 1];
          if (latest && Date.now() - latest.start < 5000) {
            sbInsert('sessions', {
              ts:       latest.start,
              date:     latest.date || new Date(latest.start).toISOString().slice(0,10),
              messages: latest.messages || 0
            });
          }
        } catch(e) {}
      }

      // Intents log
      if (key === 'ws_intents_v1') {
        try {
          const arr = JSON.parse(value);
          if (!Array.isArray(arr) || !arr.length) return;
          const latest = arr[arr.length - 1];
          if (latest && Date.now() - (latest.ts || 0) < 5000) {
            sbInsert('intents', {
              ts:     latest.ts || Date.now(),
              intent: latest.intent || '',
              date:   latest.date   || new Date().toISOString().slice(0,10)
            });
          }
        } catch(e) {}
      }
    };
  })();
  </script>

  <!-- PIN GATE MODAL -->
  <div id="pinOverlay" style="display:none;position:fixed;inset:0;background:rgba(13,31,60,0.55);z-index:99999;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)">
    <div id="pinBox" style="background:#fff;border-radius:18px;padding:36px 32px;max-width:320px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(13,31,60,0.22)">
      <div style="font-size:42px;margin-bottom:12px">🔒</div>
      <h2 style="font-size:19px;font-weight:800;color:#1a3a6b;margin-bottom:6px">Admin Access</h2>
      <p style="font-size:13px;color:#4a5878;margin-bottom:20px">Enter your 4-digit PIN</p>
      <div style="display:flex;justify-content:center;gap:14px;margin-bottom:12px" id="pinDots">
        <div id="ipd0" style="width:15px;height:15px;border-radius:50%;border:2px solid #c7d2e8;background:transparent;transition:background .15s,border-color .15s"></div>
        <div id="ipd1" style="width:15px;height:15px;border-radius:50%;border:2px solid #c7d2e8;background:transparent;transition:background .15s,border-color .15s"></div>
        <div id="ipd2" style="width:15px;height:15px;border-radius:50%;border:2px solid #c7d2e8;background:transparent;transition:background .15s,border-color .15s"></div>
        <div id="ipd3" style="width:15px;height:15px;border-radius:50%;border:2px solid #c7d2e8;background:transparent;transition:background .15s,border-color .15s"></div>
      </div>
      <div id="iPinErr" style="font-size:12.5px;color:#dc2626;font-weight:600;min-height:18px;margin-bottom:10px"></div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:9px;max-width:220px;margin:0 auto 14px">
        <button class="ipin-key" data-k="1" style="padding:13px;font-size:17px;font-weight:700;background:#eef2fb;border:1.5px solid #d1daf0;border-radius:10px;cursor:pointer;transition:background .15s,transform .1s">1</button>
        <button class="ipin-key" data-k="2" style="padding:13px;font-size:17px;font-weight:700;background:#eef2fb;border:1.5px solid #d1daf0;border-radius:10px;cursor:pointer;transition:background .15s,transform .1s">2</button>
        <button class="ipin-key" data-k="3" style="padding:13px;font-size:17px;font-weight:700;background:#eef2fb;border:1.5px solid #d1daf0;border-radius:10px;cursor:pointer;transition:background .15s,transform .1s">3</button>
        <button class="ipin-key" data-k="4" style="padding:13px;font-size:17px;font-weight:700;background:#eef2fb;border:1.5px solid #d1daf0;border-radius:10px;cursor:pointer;transition:background .15s,transform .1s">4</button>
        <button class="ipin-key" data-k="5" style="padding:13px;font-size:17px;font-weight:700;background:#eef2fb;border:1.5px solid #d1daf0;border-radius:10px;cursor:pointer;transition:background .15s,transform .1s">5</button>
        <button class="ipin-key" data-k="6" style="padding:13px;font-size:17px;font-weight:700;background:#eef2fb;border:1.5px solid #d1daf0;border-radius:10px;cursor:pointer;transition:background .15s,transform .1s">6</button>
        <button class="ipin-key" data-k="7" style="padding:13px;font-size:17px;font-weight:700;background:#eef2fb;border:1.5px solid #d1daf0;border-radius:10px;cursor:pointer;transition:background .15s,transform .1s">7</button>
        <button class="ipin-key" data-k="8" style="padding:13px;font-size:17px;font-weight:700;background:#eef2fb;border:1.5px solid #d1daf0;border-radius:10px;cursor:pointer;transition:background .15s,transform .1s">8</button>
        <button class="ipin-key" data-k="9" style="padding:13px;font-size:17px;font-weight:700;background:#eef2fb;border:1.5px solid #d1daf0;border-radius:10px;cursor:pointer;transition:background .15s,transform .1s">9</button>
        <button class="ipin-key" data-k="back" style="padding:13px;font-size:17px;font-weight:700;background:#eef2fb;border:1.5px solid #d1daf0;border-radius:10px;cursor:pointer;transition:background .15s,transform .1s">⌫</button>
        <button class="ipin-key" data-k="0" style="padding:13px;font-size:17px;font-weight:700;background:#eef2fb;border:1.5px solid #d1daf0;border-radius:10px;cursor:pointer;transition:background .15s,transform .1s">0</button>
        <button class="ipin-key" data-k="cancel" style="padding:13px;font-size:13px;font-weight:700;background:#fee2e2;border:1.5px solid #fca5a5;border-radius:10px;cursor:pointer;color:#dc2626;transition:background .15s,transform .1s">✕</button>
      </div>
    </div>
  </div>

  <script>
  (function(){
    const PIN_KEY = 'ws_admin_pin';
    const getPin = () => localStorage.getItem(PIN_KEY) || '1234';
    let entered = '';

    function updateDots(){
      for(let i=0;i<4;i++){
        const d = document.getElementById('ipd'+i);
        d.style.background = i < entered.length ? '#2563d4' : 'transparent';
        d.style.borderColor = i < entered.length ? '#2563d4' : '#c7d2e8';
      }
    }
    function shake(){
      const b = document.getElementById('pinBox');
      b.style.animation='none'; b.offsetHeight;
      b.style.animation='pinShake .4s ease';
    }
    function tryPin(){
      if(entered === getPin()){
        document.getElementById('pinOverlay').style.display='none';
        window.location.href = 'admin.html';
      } else {
        document.getElementById('iPinErr').textContent = 'Incorrect PIN — try again';
        entered = ''; updateDots(); shake();
        setTimeout(()=>document.getElementById('iPinErr').textContent='', 2000);
      }
    }

    document.querySelectorAll('.ipin-key').forEach(btn => {
      btn.addEventListener('click', () => {
        const k = btn.dataset.k;
        if(k === 'cancel'){ entered=''; updateDots(); document.getElementById('pinOverlay').style.display='none'; return; }
        if(k === 'back'){ entered = entered.slice(0,-1); }
        else if(entered.length < 4){ entered += k; }
        updateDots();
        if(entered.length === 4) setTimeout(tryPin, 120);
      });
    });

    document.addEventListener('keydown', e => {
      const ov = document.getElementById('pinOverlay');
      if(ov.style.display === 'none') return;
      if(e.key === 'Escape'){ entered=''; updateDots(); ov.style.display='none'; return; }
      if(e.key >= '0' && e.key <= '9' && entered.length < 4){ entered+=e.key; updateDots(); if(entered.length===4) setTimeout(tryPin,120); }
      if(e.key === 'Backspace'){ entered=entered.slice(0,-1); updateDots(); }
    });

    // Style for shake animation
    const style = document.createElement('style');
    style.textContent = '@keyframes pinShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}';
    document.head.appendChild(style);

    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('adminBtn');
      if(btn){
        btn.addEventListener('click', e => {
          e.preventDefault();
          entered = ''; updateDots();
          document.getElementById('iPinErr').textContent = '';
          document.getElementById('pinOverlay').style.display = 'flex';
        });
      }
    });
  })();
  </script>
</body>
