<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Welfare Support Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="./public/chat.css" />
  <script defer src="./public/chat.js"></script>
</head>

<body>
  <div class="chat-container">
    <header class="chat-header">
      <img src="./public/assets/Bot-icon.png" class="bot-avatar" alt="Welfare Support bot" />
      <h1>Welfare Support</h1>
      <div class="header-actions">
        <button id="topicsBtn" class="header-btn" type="button">Topics</button>
        <button id="clearBtn" class="clear-btn" type="button">Clear</button>
      </div>
    </header>

    <div id="chatWindow" class="chat-window"></div>

    <div class="input-area">
      <div class="input-wrap">
        <input id="chatInput" type="text" placeholder="Ask a question..." autocomplete="off" />
        <div id="suggestions" class="suggestions" hidden></div>
      </div>

      <button id="micBtn" class="icon-btn" type="button">🎤</button>
      <button id="voiceBtn" class="icon-btn" type="button">🔈</button>
      <button id="sendBtn" type="button">Send</button>
    </div>
  </div>

  <!-- Topics Drawer -->
  <div id="drawerOverlay" class="drawer-overlay" hidden></div>
  <aside id="topicsDrawer" class="drawer" hidden>
    <div class="drawer-header">
      <h2>Topics</h2>
      <button id="drawerCloseBtn" class="drawer-close" type="button">✕</button>
    </div>

    <div class="drawer-body">
      <p class="drawer-hint">Browse common topics or pick a question:</p>
      <div id="drawerCategories" class="drawer-categories"></div>
      <div id="drawerQuestions" class="drawer-questions"></div>
    </div>
  </aside>
</body>
</html>
